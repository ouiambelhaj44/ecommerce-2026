version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres_symfony
    environment:
      POSTGRES_DB: monprojet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: monprojet1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: